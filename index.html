<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SM-IDE</title>
    <script type="importmap">
        { "imports": {
            "xstate":  "https://unpkg.com/xstate@5/dist/xstate.esm.js",
            "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs",
            "fflate":  "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
        }}
    </script>
    <style>
        /* ── Tokens ─────────────────────────────────────────────────────────── */
        :root {
            --bg:          #f4f7f6;
            --panel:       #ffffff;
            --accent:      #0084ff;
            --dark:        #1c1e21;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            display: flex;
            height: 100dvh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            overflow: hidden;
        }

        /* ── Diagram pane ───────────────────────────────────────────────────── */
        #diagram-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border-right: 1px solid #ddd;
            padding: 16px;
            min-width: 0;
            overflow: hidden;
        }

        #diagram-pane h2 {
            flex-shrink: 0;
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #888;
            font-weight: 500;
        }

        #diagram-viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        #diagram-viewport:active { cursor: grabbing; }

        #diagram-canvas {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        #diagram-canvas svg { display: block; max-width: 100%; max-height: 100%; }
        #mermaid-container  { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        /* Zoom buttons — hidden on touch-primary devices (use pinch instead) */
        #zoom-controls {
            position: absolute;
            bottom: 12px; right: 12px;
            display: flex; flex-direction: column; gap: 4px;
            z-index: 10;
        }

        #zoom-controls button {
            width: 36px; height: 36px;
            padding: 0; font-size: 18px;
            border-radius: 6px;
            background: rgba(40,44,52,0.85);
            border: 1px solid #444; color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        @media (hover: none) and (pointer: coarse) {
            #zoom-controls { display: none; }
        }

        /* ── Desktop pane resize handle ─────────────────────────────────────── */
        #pane-drag-handle {
            width: 6px;
            flex-shrink: 0;
            background: transparent;
            cursor: col-resize;
            z-index: 15;
            transition: background 0.15s;
        }

        #pane-drag-handle:hover,
        #pane-drag-handle.dragging { background: var(--accent); }

        /* ── Right pane ─────────────────────────────────────────────────────── */
        #right-pane {
            width: 390px;
            min-width: 260px;
            max-width: 80vw;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            box-shadow: -2px 0 10px rgba(0,0,0,0.08);
            z-index: 10;
            position: relative;
        }

        /* ── App title bar ──────────────────────────────────────────────────── */
        #app-titlebar {
            padding: 8px 12px 6px;
            background: var(--dark);
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-shrink: 0;
        }

        #app-title {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #61dafb;
            letter-spacing: 0.05em;
        }

        #version-badge {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #888;
            background: #2a2d35;
            border: 1px solid #3a3d45;
            border-radius: 3px;
            padding: 1px 6px;
            white-space: nowrap;
        }

        /* ── Toolbar ────────────────────────────────────────────────────────── */
        #toolbar {
            padding: 6px 10px;
            background: #23272e;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-bottom: 1px solid #333;
        }

        #toolbar button {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 5px;
            white-space: nowrap;
        }

        /* ── Touch-friendly tooltip ─────────────────────────────────────────── */
        #touch-tooltip {
            position: fixed;
            background: rgba(30,33,40,0.95);
            color: #abb2bf;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            line-height: 1.4;
            padding: 7px 11px;
            border-radius: 7px;
            border: 1px solid #444;
            box-shadow: 0 4px 14px rgba(0,0,0,0.45);
            max-width: 220px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        #touch-tooltip.visible { opacity: 1; }

        /* ── Context / profile viewer ───────────────────────────────────────── */
        #profile-viewer {
            background: #282c34;
            color: #61dafb;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow: hidden;
            border-bottom: 2px solid #444;
            flex-shrink: 0;
            max-height: 0;
            transition: max-height 0.25s ease;
        }

        #profile-viewer.open {
            max-height: 200px;
            overflow-y: auto;
        }

        #profile-viewer-inner { padding: 10px 14px; }

        #profile-toggle {
            padding: 4px 10px;
            background: #23272e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
        }

        #profile-toggle span {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #888;
        }

        #profile-toggle-arrow {
            font-size: 10px;
            color: #555;
            transition: transform 0.2s;
        }

        /* ── Replay bar ─────────────────────────────────────────────────────── */
        #replay-bar {
            padding: 8px 10px;
            background: #eee;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        #replay-bar input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }

        /* ── Messages ───────────────────────────────────────────────────────── */
        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg.bot  { background: #e4e6eb; align-self: flex-start; color: #050505; border-bottom-left-radius: 4px; }
        .msg.user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 4px; }

        /* ── Controls / input area ──────────────────────────────────────────── */
        #controls-container {
            padding: 10px 14px;
            padding-bottom: calc(10px + var(--safe-bottom));
            border-top: 1px solid #eee;
            background: white;
            flex-shrink: 0;
        }

        #input-area { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── Global button defaults ─────────────────────────────────────────── */
        button {
            padding: 8px 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }

        button:hover  { opacity: 0.85; }
        button:active { opacity: 0.7; }

        .restart-btn { background: #ff4757; }

        input[type="text"] {
            padding: 9px 11px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        /* ── Mobile layout ──────────────────────────────────────────────────── */
        @media (max-width: 700px) {
            #diagram-pane {
                position: absolute;
                inset: 0;
                z-index: 1;
                border-right: none;
            }

            #right-pane {
                position: absolute;
                inset: 0;
                width: 100% !important;
                min-width: unset;
                max-width: unset;
                z-index: 5;
                border-left: none;
                transition: transform 0.3s ease;
            }

            /* Collapsed: slide right leaving a 48px tab showing */
            #right-pane.pane-collapsed {
                transform: translateX(calc(100% - 48px));
            }

            #pane-drag-handle { display: none; }

            #mobile-collapse-tab { display: flex; }
        }

        /* ── Mobile collapse tab (hidden on desktop) ────────────────────────── */
        #mobile-collapse-tab {
            display: none;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 64px;
            background: var(--dark);
            border-radius: 0 10px 10px 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            color: #61dafb;
            user-select: none;
            gap: 2px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.3);
        }

        #mobile-collapse-tab .tab-arrow { font-size: 20px; line-height: 1; }
        #mobile-collapse-tab .tab-label { font-size: 8px; color: #888; font-family: monospace; letter-spacing: 0.04em; }
    </style>
</head>
<body>

    <!-- ── Diagram pane ──────────────────────────────────────────────────── -->
    <div id="diagram-pane">
        <h2>Live State Machine</h2>
        <div id="diagram-viewport">
            <div id="diagram-canvas">
                <div id="mermaid-container"></div>
            </div>
            <div id="zoom-controls">
                <button onclick="window.diagramZoom(0.2)"  title="Zoom in">+</button>
                <button onclick="window.diagramZoom(-0.2)" title="Zoom out">−</button>
                <button onclick="window.diagramReset()"    title="Reset" style="font-size:11px;">⊙</button>
            </div>
        </div>
    </div>

    <!-- ── Desktop resize handle ─────────────────────────────────────────── -->
    <div id="pane-drag-handle" title="Drag to resize panes"></div>

    <!-- ── Right pane ────────────────────────────────────────────────────── -->
    <div id="right-pane">

        <!-- Mobile collapse tab sits on LEFT edge, always visible -->
        <div id="mobile-collapse-tab" title="Tap to show/hide diagram">
            <span class="tab-arrow" id="tab-arrow">‹</span>
            <span class="tab-label">DIAGRAM</span>
        </div>

        <!-- App title + version -->
        <div id="app-titlebar">
            <span id="app-title">SM-IDE</span>
            <span id="version-badge"><span id="version-label">—</span></span>
        </div>

        <!-- Toolbar -->
        <div id="toolbar">
            <button onclick="window.downloadPair()" title="Save state machine config and services as a ZIP file">💾 Save</button>
            <button onclick="document.getElementById('upload').click()" title="Load state machine config (.json), services (.js), or both as a ZIP">📂 Load</button>
            <button onclick="window.runAllTraces && window.runAllTraces()" title="Auto-generate all possible paths and run them as tests">🧪 Test</button>
            <button onclick="document.getElementById('load-results').click()" title="Load and view a previously saved test results JSON file">📋 Results</button>
            <input type="file" id="upload"       style="display:none" accept=".zip,.json,.js" multiple
                   onchange="window.loadPair(this.files); this.value='';">
            <input type="file" id="load-results" style="display:none" accept=".json"
                   onchange="window.loadTestResults && window.loadTestResults(this.files[0]); this.value='';">
        </div>

        <!-- Context viewer (collapsed by default) -->
        <div id="profile-toggle" onclick="window.toggleProfile()">
            <span>CONTEXT &amp; STATE</span>
            <span id="profile-toggle-arrow">▼</span>
        </div>
        <div id="profile-viewer">
            <div id="profile-viewer-inner">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <strong>CONTEXT (REAL-TIME)</strong>
                    <button id="copy-btn" onclick="window.copyTrace()"
                            style="font-size:10px; padding:2px 6px; background:#444;">📋 Copy Trace</button>
                </div>
                <pre id="profile-view">{}</pre>
                <div id="state-id" style="font-size:10px; color:#888; margin-top:4px;">State: loading…</div>
            </div>
        </div>

        <!-- Replay bar -->
        <div id="replay-bar">
            <button onclick="window._restartRuntime()" class="restart-btn" title="Restart">🔄</button>
            <input type="text" id="replay-input" placeholder="Paste trace to replay…">
            <button onclick="window._replayTrace(document.getElementById('replay-input').value)" title="Replay trace">▶</button>
        </div>

        <!-- Chat -->
        <div id="messages"></div>

        <!-- Input controls -->
        <div id="controls-container">
            <div id="input-area"></div>
        </div>

    </div><!-- end #right-pane -->

    <!-- ── Touch tooltip ─────────────────────────────────────────────────── -->
    <div id="touch-tooltip"></div>

    <script>
        // Touch tooltip
        (() => {
            const tip = document.getElementById('touch-tooltip');
            let hideTimer = null;

            function show(text, x, y) {
                clearTimeout(hideTimer);
                tip.textContent = text;
                tip.classList.add('visible');
                const tw = tip.offsetWidth || 220, th = tip.offsetHeight || 40;
                let lx = x + 10, ly = y - th - 10;
                if (lx + tw > window.innerWidth)  lx = x - tw - 10;
                if (ly < 0)                        ly = y + 10;
                tip.style.left = lx + 'px';
                tip.style.top  = ly + 'px';
            }

            function hide(delay = 0) {
                clearTimeout(hideTimer);
                if (delay) hideTimer = setTimeout(() => tip.classList.remove('visible'), delay);
                else tip.classList.remove('visible');
            }

            document.addEventListener('touchstart', (e) => {
                const btn = e.target.closest('[title]');
                if (!btn) { hide(); return; }
                show(btn.getAttribute('title'), e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });

            document.addEventListener('touchend',  () => hide(1200), { passive: true });
            document.addEventListener('touchmove', () => hide(0),    { passive: true });
        })();
    </script>

    <script type="module">
        import mermaid from 'mermaid';
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        console.log('✅ Mermaid initialised');

        // ── Profile viewer toggle ─────────────────────────────────────────────
        window.toggleProfile = () => {
            const viewer = document.getElementById('profile-viewer');
            const arrow  = document.getElementById('profile-toggle-arrow');
            const toggle = document.getElementById('profile-toggle');
            const isOpen = viewer.classList.toggle('open');
            arrow.style.transform = isOpen ? 'rotate(180deg)' : '';
            toggle.classList.toggle('open', isOpen);
        };

        // ── Zoom / pan state ──────────────────────────────────────────────────
        let _scale = 1, _tx = 0, _ty = 0;

        const canvas = () => document.getElementById('diagram-canvas');

        const applyTransform = () => {
            const c = canvas();
            if (c) c.style.transform = `translate(${_tx}px, ${_ty}px) scale(${_scale})`;
        };

        window.diagramZoom = (delta) => {
            _scale = Math.min(4, Math.max(0.2, _scale + delta));
            applyTransform();
        };

        window.diagramReset = () => {
            _scale = 1; _tx = 0; _ty = 0;
            const c = canvas();
            if (c) c.style.transform = '';
        };

        // Mousewheel zoom (desktop)
        document.addEventListener('wheel', (e) => {
            if (!document.getElementById('diagram-viewport')?.contains(e.target)) return;
            e.preventDefault();
            window.diagramZoom(e.deltaY < 0 ? 0.1 : -0.1);
        }, { passive: false });

        // ── Mouse pan (desktop) ───────────────────────────────────────────────
        let _mouseDragging = false, _mouseDragStart = null;
        const vp = () => document.getElementById('diagram-viewport');

        document.addEventListener('mousedown', (e) => {
            if (!vp()?.contains(e.target) || e.target.closest('button')) return;
            _mouseDragging  = true;
            _mouseDragStart = { x: e.clientX - _tx, y: e.clientY - _ty };
        });
        document.addEventListener('mousemove', (e) => {
            if (!_mouseDragging) return;
            _tx = e.clientX - _mouseDragStart.x;
            _ty = e.clientY - _mouseDragStart.y;
            applyTransform();
        });
        document.addEventListener('mouseup', () => { _mouseDragging = false; });

        // ── Touch: 1-finger pan + 2-finger pinch-to-zoom ──────────────────────
        let _t1Start = null, _pinchDist0 = null, _pinchScale0 = null;

        function touchDist(a, b) {
            return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        }

        const diagVp = document.getElementById('diagram-viewport');

        diagVp.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                _t1Start    = { x: e.touches[0].clientX - _tx, y: e.touches[0].clientY - _ty };
                _pinchDist0 = null;
            } else if (e.touches.length === 2) {
                _t1Start     = null;
                _pinchDist0  = touchDist(e.touches[0], e.touches[1]);
                _pinchScale0 = _scale;
            }
        }, { passive: true });

        diagVp.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && _t1Start) {
                _tx = e.touches[0].clientX - _t1Start.x;
                _ty = e.touches[0].clientY - _t1Start.y;
                applyTransform();
            } else if (e.touches.length === 2 && _pinchDist0) {
                const ratio = touchDist(e.touches[0], e.touches[1]) / _pinchDist0;
                _scale = Math.min(4, Math.max(0.2, _pinchScale0 * ratio));
                applyTransform();
            }
        }, { passive: false });

        diagVp.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) { _pinchDist0 = null; _pinchScale0 = null; }
            if (e.touches.length === 0) _t1Start = null;
        }, { passive: true });

        // ── Desktop pane resize handle ────────────────────────────────────────
        const dragHandle = document.getElementById('pane-drag-handle');
        const rightPane  = document.getElementById('right-pane');
        let   _resizing  = false;

        dragHandle.addEventListener('mousedown', (e) => {
            _resizing = true;
            dragHandle.classList.add('dragging');
            document.body.style.cursor    = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!_resizing) return;
            const newW = Math.max(260, Math.min(window.innerWidth * 0.8,
                window.innerWidth - e.clientX));
            rightPane.style.width = newW + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (!_resizing) return;
            _resizing = false;
            dragHandle.classList.remove('dragging');
            document.body.style.cursor    = '';
            document.body.style.userSelect = '';
        });

        // ── Mobile collapse tab ───────────────────────────────────────────────
        const collapseTab    = document.getElementById('mobile-collapse-tab');
        const tabArrow       = document.getElementById('tab-arrow');
        let   _paneCollapsed = false;

        const toggleMobilePane = () => {
            _paneCollapsed = !_paneCollapsed;
            rightPane.classList.toggle('pane-collapsed', _paneCollapsed);
            tabArrow.textContent = _paneCollapsed ? '›' : '‹';
        };

        collapseTab.addEventListener('click', toggleMobilePane);

        // Swipe right on right pane header area to collapse; left to expand
        let _swipeStartX = null;

        rightPane.addEventListener('touchstart', (e) => {
            if (e.target.closest('input, button, #messages, #input-area, #profile-viewer')) return;
            _swipeStartX = e.touches[0].clientX;
        }, { passive: true });

        rightPane.addEventListener('touchend', (e) => {
            if (_swipeStartX === null) return;
            const dx = e.changedTouches[0].clientX - _swipeStartX;
            _swipeStartX = null;
            if (dx >  70 && !_paneCollapsed) toggleMobilePane();
            if (dx < -70 &&  _paneCollapsed) toggleMobilePane();
        }, { passive: true });

        // ── Test results drawer: touch drag ───────────────────────────────────
        // MutationObserver wires touch-drag to any drawer added later by generate-traces.js
        new MutationObserver((mutations) => {
            mutations.forEach(m => m.addedNodes.forEach(node => {
                if (node.id === 'test-results-drawer') attachDrawerTouchDrag(node);
            }));
        }).observe(document.body, { childList: true });

        function attachDrawerTouchDrag(drawer) {
            const header = drawer.firstElementChild;
            if (!header) return;
            let sx, sy, sl, st;

            header.addEventListener('touchstart', (e) => {
                if (e.target.closest('button')) return;
                const rect = drawer.getBoundingClientRect();
                sx = e.touches[0].clientX; sy = e.touches[0].clientY;
                sl = rect.left;            st = rect.top;
                drawer.style.transition = 'none';
            }, { passive: true });

            header.addEventListener('touchmove', (e) => {
                const dx = e.touches[0].clientX - sx;
                const dy = e.touches[0].clientY - sy;
                drawer.style.left   = Math.max(0, Math.min(window.innerWidth  - drawer.offsetWidth,  sl + dx)) + 'px';
                drawer.style.top    = Math.max(0, Math.min(window.innerHeight - drawer.offsetHeight, st + dy)) + 'px';
                drawer.style.right  = 'auto';
                drawer.style.bottom = 'auto';
            }, { passive: true });

            header.addEventListener('touchend', () => {
                drawer.style.transition = '';
            }, { passive: true });
        }

        // ── Diagram render ────────────────────────────────────────────────────
        window.renderDiagram = async (config, current, visitedEdges = new Set()) => {
            let graph = `graph TD\n`;

            Object.keys(config.states).forEach(id => {
                const style = id === current ? `:::activeNode` : '';
                graph += `  ${id}["${id}"]${style}\n`;

                if (config.states[id].on) {
                    Object.entries(config.states[id].on).forEach(([ev, transition]) => {
                        const entries = Array.isArray(transition) ? transition : [transition];
                        const targets = new Set();
                        entries.forEach(t => {
                            const tId = typeof t === 'string' ? t : t?.target;
                            if (tId && tId !== id) targets.add(tId);
                        });
                        targets.forEach(tId => {
                            const visited = visitedEdges.has(`${id}|${ev}`);
                            graph += `  ${id} -- "${visited ? '✓ ' : ''}${ev}" --> ${tId}\n`;
                        });
                    });
                }

                if (config.states[id].always) {
                    const targets = Array.isArray(config.states[id].always)
                        ? config.states[id].always : [config.states[id].always];
                    targets.forEach(t => {
                        const tId = t.target || t;
                        graph += `  ${id} -- "${visitedEdges.has(`${id}|auto`) ? '✓ ' : ''}auto" --> ${tId}\n`;
                    });
                }

                if (config.states[id].invoke) {
                    const inv = config.states[id].invoke;
                    if (inv.onDone?.target) {
                        const visited = visitedEdges.has(`${id}|done`);
                        graph += `  ${id} -. "${visited ? '✓ ' : ''}done" .-> ${inv.onDone.target}\n`;
                    }
                    if (inv.onError?.target) {
                        const visited = visitedEdges.has(`${id}|error`);
                        graph += `  ${id} -. "${visited ? '✓ ' : ''}error" .-> ${inv.onError.target}\n`;
                    }
                }
            });

            graph += `\nclassDef activeNode fill:#0084ff,stroke:#0051ff,stroke-width:4px,color:#fff;`;

            console.log('🗺️  Mermaid source:\n' + graph);

            try {
                const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), graph);
                document.getElementById('mermaid-container').innerHTML = svg;
                console.log('✅ Diagram rendered');
            } catch (e) {
                console.error('❌ mermaid.render() threw:', e.message);
                document.getElementById('mermaid-container').innerHTML =
                    `<pre style="color:red;font-size:11px;">Diagram error:\n${e.message}</pre>`;
            }
        };
    </script>

    <script type="module" src="./main.js"></script>

</body>
</html>
