<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Conversation Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .timeline-user { border-left: 3px solid #3b82f6; }
    .timeline-assistant { border-left: 3px solid #10b981; }
    .timeline-event { border-left: 3px solid #f59e0b; }
    .sources-json, .questions-json { font-size: 11px; color: #6b7280; }
    pre { white-space: pre-wrap; word-break: break-word; }
    /* Tree lines */
    .tree-line { width: 16px; flex-shrink: 0; border-left: 2px solid #d1d5db; margin-left: 6px; }
    .tree-line-purple { border-left-color: #c084fc; }
    .tree-row { display: flex; align-items: stretch; margin-bottom: 6px; }
    .tree-content { flex: 1; min-width: 0; }
    /* Collapsible entries */
    .entry-collapsed .entry-full { display: none; }
    .entry-collapsed .entry-snippet { display: block; }
    .entry-expanded .entry-full { display: block; }
    .entry-expanded .entry-snippet { display: none; }
    .entry-snippet { font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .entry-toggle { cursor: pointer; user-select: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Auth screen -->
  <div id="auth-screen" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
      <h1 class="text-xl font-bold mb-4">Admin Login</h1>
      <input id="proxy-url" type="text" class="w-full border rounded-lg px-3 py-2 mb-3 text-sm"
        placeholder="Proxy URL" value="https://aiproxy.subhikksha.workers.dev">
      <input id="admin-token" type="password" class="w-full border rounded-lg px-3 py-2 mb-4 text-sm"
        placeholder="Admin token">
      <button onclick="doLogin()" class="w-full bg-blue-500 text-white rounded-lg px-4 py-2 hover:bg-blue-600">
        Connect
      </button>
      <p id="auth-error" class="text-red-500 text-sm mt-2 hidden"></p>
    </div>
  </div>

  <!-- Main dashboard -->
  <div id="dashboard" class="hidden">
    <!-- Header -->
    <div class="bg-white border-b px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-bold">Conversation Admin</h1>
      <div class="flex items-center gap-4">
        <div id="stats" class="text-xs text-gray-500 flex gap-4"></div>
        <button onclick="doRefresh()" class="text-xs text-gray-400 hover:text-blue-500" title="Refresh data">↻</button>
        <button onclick="doLogout()" class="text-xs text-gray-400 hover:text-red-500">Logout</button>
      </div>
    </div>

    <div class="flex h-[calc(100vh-65px)]">
      <!-- Visitor list -->
      <div class="w-80 border-r bg-white overflow-y-auto flex-shrink-0">
        <div class="p-3 border-b">
          <input id="visitor-search" type="text" class="w-full border rounded-lg px-3 py-1.5 text-sm"
            placeholder="Filter visitors..." oninput="filterVisitors()">
        </div>
        <div id="visitor-list" class="divide-y"></div>
        <div class="p-3">
          <button onclick="loadMoreVisitors()" id="load-more-btn"
            class="w-full text-xs text-blue-500 hover:text-blue-700 py-1">Load more</button>
        </div>
      </div>

      <!-- Timeline -->
      <div class="flex-1 overflow-y-auto p-6" id="timeline-panel">
        <div class="text-gray-400 text-sm text-center mt-20">Select a visitor from the left panel</div>
      </div>
    </div>
  </div>

<script>
let PROXY_URL = '';
let ADMIN_TOKEN = '';
let allVisitors = [];
let visitorOffset = 0;

// --- Auth ---
function doLogin() {
  PROXY_URL = document.getElementById('proxy-url').value.trim();
  ADMIN_TOKEN = document.getElementById('admin-token').value.trim();
  if (!PROXY_URL || !ADMIN_TOKEN) {
    showAuthError('Both fields required');
    return;
  }
  // Save to sessionStorage
  sessionStorage.setItem('admin_proxy', PROXY_URL);
  sessionStorage.setItem('admin_token', ADMIN_TOKEN);
  loadDashboard();
}

let _selectedVisitor = null;

async function doRefresh() {
  const stats = await adminAPI('admin-stats');
  renderStats(stats);
  visitorOffset = 0;
  allVisitors = [];
  await loadMoreVisitors();
  if (_selectedVisitor) loadTimeline(_selectedVisitor);
}

function doLogout() {
  sessionStorage.removeItem('admin_proxy');
  sessionStorage.removeItem('admin_token');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// --- API helper ---
async function adminAPI(action, params = {}) {
  const resp = await fetch(PROXY_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Token': ADMIN_TOKEN,
      'X-Proxy-Token': ADMIN_TOKEN,  // also satisfies proxy token check
    },
    body: JSON.stringify({ action, ...params }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  return resp.json();
}

// --- Dashboard ---
async function loadDashboard() {
  try {
    const stats = await adminAPI('admin-stats');
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    renderStats(stats);
    visitorOffset = 0;
    allVisitors = [];
    await loadMoreVisitors();
  } catch (e) {
    showAuthError(e.message);
  }
}

function renderStats(s) {
  document.getElementById('stats').innerHTML = `
    <span>Visitors: <strong>${s.totalVisitors}</strong></span>
    <span>Messages: <strong>${s.totalMessages}</strong></span>
    <span>Clicks: <strong>${s.totalClicks}</strong></span>
    <span>Active today: <strong>${s.activeToday}</strong></span>
  `;
}

// --- Visitors ---
async function loadMoreVisitors() {
  try {
    const data = await adminAPI('admin-visitors', { limit: 50, offset: visitorOffset });
    allVisitors = allVisitors.concat(data.visitors);
    visitorOffset += data.visitors.length;
    renderVisitorList();
    if (data.visitors.length < 50) {
      document.getElementById('load-more-btn').classList.add('hidden');
    }
  } catch (e) {
    console.error('Failed to load visitors:', e);
  }
}

function renderVisitorList() {
  const filter = (document.getElementById('visitor-search').value || '').toLowerCase();
  const container = document.getElementById('visitor-list');
  const filtered = filter
    ? allVisitors.filter(v => v.visitor_id.toLowerCase().includes(filter))
    : allVisitors;

  container.innerHTML = filtered.map(v => `
    <div class="px-4 py-3 hover:bg-blue-50 cursor-pointer transition-colors" onclick="loadTimeline('${v.visitor_id}')">
      <div class="text-xs font-mono text-gray-500 truncate">${v.visitor_id}</div>
      <div class="flex items-center justify-between mt-1">
        <span class="text-xs text-gray-400">${v.message_count} messages</span>
        <span class="text-xs text-gray-400">${formatDate(v.last_seen)}</span>
      </div>
    </div>
  `).join('');
}

function filterVisitors() {
  renderVisitorList();
}

// --- Timeline ---
async function loadTimeline(visitorId) {
  _selectedVisitor = visitorId;
  const panel = document.getElementById('timeline-panel');
  panel.innerHTML = '<div class="text-gray-400 text-sm text-center mt-20">Loading...</div>';

  // Highlight selected visitor
  document.querySelectorAll('#visitor-list > div').forEach(el => el.classList.remove('bg-blue-50'));

  try {
    const data = await adminAPI('admin-timeline', { visitor_id: visitorId });
    renderTimeline(visitorId, data.timeline);
  } catch (e) {
    panel.innerHTML = `<div class="text-red-500 text-sm text-center mt-20">Error: ${esc(e.message)}</div>`;
  }
}

function renderTimeline(visitorId, timeline) {
  const panel = document.getElementById('timeline-panel');

  const header = `
    <div class="mb-6">
      <h2 class="text-sm font-bold text-gray-700">Visitor Timeline</h2>
      <div class="text-xs font-mono text-gray-400 mt-1">${esc(visitorId)}</div>
      <div class="text-xs text-gray-400 mt-1">${timeline.length} events</div>
    </div>
  `;

  // Build lookups
  const exchangeLabel = {};   // exchange_id → short label
  const exchangeRowId = {};   // exchange_id → DOM id for scroll-to
  const depthMap = {};        // exchange_id → depth (0 = root)
  let rowCounter = 0;

  for (const entry of timeline) {
    if (!entry.exchange_id) continue;
    if (!exchangeLabel[entry.exchange_id] && entry.role === 'user' && entry.type === 'chat') {
      exchangeLabel[entry.exchange_id] = entry.content.substring(0, 50) + (entry.content.length > 50 ? '…' : '');
    }
    if (depthMap[entry.exchange_id] === undefined) {
      depthMap[entry.exchange_id] = entry.parent_exchange_id
        ? (depthMap[entry.parent_exchange_id] || 0) + 1
        : 0;
    }
  }

  // Helper: render N tree lines for depth
  function treeLines(depth) {
    let html = '';
    for (let d = 0; d < depth; d++) {
      html += `<div class="tree-line${d === depth - 1 ? ' tree-line-purple' : ''}"></div>`;
    }
    return html;
  }

  // Helper: snippet text (first 80 chars, no HTML)
  function snippet(text) {
    const plain = text.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    return plain.substring(0, 80) + (plain.length > 80 ? '…' : '');
  }

  const rowParts = [];
  for (let idx = 0; idx < timeline.length; idx++) {
    const entry = timeline[idx];
    const rowId = 'row-' + (rowCounter++);
    const depth = depthMap[entry.exchange_id] || 0;
    const isChat = entry.type === 'chat';
    const isUser = entry.role === 'user';
    const isAssistant = entry.role === 'assistant';
    const isEvent = entry.type === 'event';
    const isQuestionClick = isEvent && entry.role === 'question';
    const hasBranch = isChat && entry.parent_exchange_id;

    if (entry.exchange_id && !exchangeRowId[entry.exchange_id]) {
      exchangeRowId[entry.exchange_id] = rowId;
    }

    // Merge question click + duplicate user message
    if (isQuestionClick) {
      let qTitle = '';
      try { qTitle = JSON.parse(entry.content).title || ''; } catch {}
      const next = timeline[idx + 1];
      if (next && next.role === 'user' && next.type === 'chat' && next.content.trim() === qTitle.trim()) {
        const nextRowId = 'row-' + (rowCounter++);
        const nextDepth = depthMap[next.exchange_id] || 0;
        if (next.exchange_id) exchangeRowId[next.exchange_id] = nextRowId;
        const parentLabel = exchangeLabel[next.parent_exchange_id] || '';
        const parentRowTarget = exchangeRowId[next.parent_exchange_id] || '';
        const backLink = parentLabel
          ? ` <span class="text-xs text-purple-400 cursor-pointer hover:text-purple-600" onclick="event.stopPropagation();document.getElementById('${parentRowTarget}')?.scrollIntoView({behavior:'smooth',block:'center'})">(from: ${esc(parentLabel)})</span>`
          : '';
        rowParts.push(`
          <div id="${nextRowId}" class="tree-row">
            ${treeLines(nextDepth)}
            <div class="tree-content timeline-event pl-3 py-2 bg-purple-50 rounded-r-lg shadow-sm" style="border-left-color:#9333ea">
              <div class="text-xs">
                <span class="font-semibold text-purple-600">↳ Suggested Q:</span>
                <span class="text-purple-800 italic">${esc(qTitle)}</span>
                ${backLink}
                <span class="text-gray-400 float-right">${formatDate(entry.created_at)}</span>
              </div>
            </div>
          </div>
        `);
        idx++;
        continue;
      }
    }

    let borderClass = 'timeline-event';
    let label = entry.role;
    let labelColor = 'text-yellow-600';
    let bgClass = 'bg-white';

    if (isUser) { borderClass = 'timeline-user'; labelColor = 'text-blue-600'; label = 'User'; bgClass = 'bg-blue-50'; }
    if (isAssistant) { borderClass = 'timeline-assistant'; labelColor = 'text-green-600'; label = 'Assistant'; }
    if (isQuestionClick) { label = 'Question'; labelColor = 'text-purple-600'; }
    else if (isEvent) { label = 'Click'; labelColor = 'text-yellow-600'; }

    let content = esc(entry.content || '');
    if (isEvent) {
      try {
        const d = JSON.parse(entry.content);
        if (isQuestionClick) {
          content = `<em>${esc(d.title)}</em>`;
        } else {
          content = `<a href="${esc(d.url)}" target="_blank" class="text-blue-500 hover:underline">${esc(d.title || d.url)}</a>`;
        }
      } catch {}
    }

    // Back-link
    let backLinkHtml = '';
    if (hasBranch && isUser) {
      const parentLabel = exchangeLabel[entry.parent_exchange_id] || '';
      const parentRowTarget = exchangeRowId[entry.parent_exchange_id] || '';
      if (parentLabel) {
        backLinkHtml = ` <span class="text-xs text-purple-400 cursor-pointer hover:text-purple-600" onclick="event.stopPropagation();document.getElementById('${parentRowTarget}')?.scrollIntoView({behavior:'smooth',block:'center'})">(from: ${esc(parentLabel)})</span>`;
      }
    }

    // Sources
    let sourcesHtml = '';
    if (entry.sources) {
      try {
        const srcs = JSON.parse(entry.sources);
        if (srcs.length) {
          sourcesHtml = `<div class="sources-json mt-1">Sources: ${srcs.map(s =>
            `<a href="${esc(s.url)}" target="_blank" class="text-blue-400 hover:underline">${esc(s.title || s.url)}</a>`
          ).join(', ')}</div>`;
        }
      } catch {}
    }

    // Related questions
    let questionsHtml = '';
    if (entry.related_questions) {
      try {
        const qs = JSON.parse(entry.related_questions);
        if (qs.length) {
          questionsHtml = `<div class="questions-json mt-1">Related: ${qs.map(q => `<em>${esc(q)}</em>`).join(' | ')}</div>`;
        }
      } catch {}
    }

    const snippetText = snippet(content);
    const isLong = content.length > 100;

    rowParts.push(`
      <div id="${rowId}" class="tree-row">
        ${treeLines(depth)}
        <div class="tree-content ${borderClass} pl-3 py-2 ${bgClass} rounded-r-lg shadow-sm ${isLong ? 'entry-collapsed entry-toggle' : ''}" ${isLong ? 'onclick="this.classList.toggle(\'entry-collapsed\');this.classList.toggle(\'entry-expanded\')"' : ''}>
          <div class="flex items-center justify-between mb-0.5">
            <span class="text-xs font-semibold ${labelColor}">${label}${backLinkHtml}</span>
            <span class="text-xs text-gray-400">${formatDate(entry.created_at)}</span>
          </div>
          ${isLong ? `<div class="entry-snippet">${esc(snippetText)}</div>` : ''}
          <div class="${isLong ? 'entry-full' : ''} text-sm text-gray-700 whitespace-pre-wrap">${content}</div>
          ${sourcesHtml}
          ${questionsHtml}
        </div>
      </div>
    `);
  }
  const rows = rowParts.join('');

  panel.innerHTML = header + rows;
  panel.scrollTop = panel.scrollHeight;
}

// --- Helpers ---
function formatDate(iso) {
  if (!iso) return '';
  try {
    // D1 datetime('now') returns "2026-04-08 14:30:00" (no Z), client sends full ISO with Z
    const d = new Date(iso.includes('T') || iso.includes('Z') ? iso : iso + 'Z');
    if (isNaN(d)) return iso;
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch { return iso; }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Auto-login from session ---
window.addEventListener('DOMContentLoaded', () => {
  const savedProxy = sessionStorage.getItem('admin_proxy');
  const savedToken = sessionStorage.getItem('admin_token');
  if (savedProxy && savedToken) {
    PROXY_URL = savedProxy;
    ADMIN_TOKEN = savedToken;
    document.getElementById('proxy-url').value = savedProxy;
    loadDashboard();
  }
});
</script>
</body>
</html>
