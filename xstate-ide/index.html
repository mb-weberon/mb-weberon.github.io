<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Logic IDE</title>
    <script type="importmap">
        { "imports": {
            "xstate": "https://unpkg.com/xstate@5/dist/xstate.esm.js",
            "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs",
            "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
        }}
    </script>
    <style>
        :root { --bg: #f4f7f6; --panel: #ffffff; --accent: #0084ff; --dark: #1c1e21; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

        #diagram-pane { flex: 1; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid #ddd; padding: 20px; min-width: 0; overflow: hidden; }
        #diagram-pane h2 { flex-shrink: 0; }
        #diagram-viewport { flex: 1; overflow: hidden; position: relative; cursor: grab; user-select: none; }
        #diagram-viewport:active { cursor: grabbing; }
        #diagram-canvas { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; transform-origin: center center; }
        #diagram-canvas svg { display: block; max-width: 100%; max-height: 100%; }
        #mermaid-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        #zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        #zoom-controls button { width: 32px; height: 32px; padding: 0; font-size: 16px; border-radius: 6px; background: rgba(40,44,52,0.85); border: 1px solid #444; color: #fff; line-height: 1; display: flex; align-items: center; justify-content: center; }

        #right-pane { width: 380px; min-width: 320px; display: flex; flex-direction: column; background: var(--panel); box-shadow: -2px 0 10px rgba(0,0,0,0.05); }

        #toolbar { padding: 10px 12px; background: var(--dark); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        #toolbar .toolbar-left { display: flex; gap: 8px; }
        #version-badge { font-family: 'Courier New', monospace; font-size: 11px; color: #61dafb; background: #2a2d35; border: 1px solid #444; border-radius: 4px; padding: 3px 8px; white-space: nowrap; }

        #profile-viewer { height: 175px; padding: 10px 14px; background: #282c34; color: #61dafb; font-family: 'Courier New', monospace; font-size: 11px; overflow-y: auto; border-bottom: 2px solid #444; }
        #replay-bar { padding: 10px; background: #eee; display: flex; gap: 5px; border-bottom: 1px solid #ddd; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        #controls-container { padding: 12px 16px; border-top: 1px solid #eee; background: white; }
        #input-area { display: flex; gap: 10px; flex-wrap: wrap; }

        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .bot  { background: #e4e6eb; align-self: flex-start; color: #050505; border-bottom-left-radius: 4px; }
        .user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 4px; }

        button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .restart-btn { background: #ff4757; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="diagram-pane">
        <h2 style="margin: 0 0 10px 0; font-size: 18px; color: #555;">Live State Machine</h2>
        <div id="diagram-viewport">
            <div id="diagram-canvas">
                <div id="mermaid-container"></div>
            </div>
            <div id="zoom-controls">
                <button onclick="window.diagramZoom(0.2)" title="Zoom in">+</button>
                <button onclick="window.diagramZoom(-0.2)" title="Zoom out">−</button>
                <button onclick="window.diagramReset()" title="Reset zoom" style="font-size:11px;">⊙</button>
            </div>
        </div>
    </div>

    <div id="right-pane">
        <div id="toolbar">
            <div class="toolbar-left">
                <button onclick="window.downloadPair()">💾 Save Flow</button>
                <button onclick="document.getElementById('upload').click()">📂 Load Flow</button>
                <input type="file" id="upload" style="display:none" accept=".zip,.json,.js" multiple onchange="window.loadPair(this.files); this.value='';">
            </div>
            <div id="version-badge"><span id="version-label">—</span></div>
        </div>

        <div id="profile-viewer">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <strong>CONTEXT (REAL-TIME)</strong>
                <button id="copy-btn" onclick="window.copyTrace()" style="font-size:10px; padding:2px 6px;">📋 Copy Trace</button>
            </div>
            <pre id="profile-view">{}</pre>
            <div id="state-id" style="font-size:10px; color:#888; margin-top:5px;">State: loading...</div>
        </div>

        <div id="replay-bar">
            <button onclick="window._restartRuntime()" class="restart-btn">🔄 Restart</button>
            <input type="text" id="replay-input" placeholder="Paste Replay String...">
	    <button onclick="window._replayTrace(document.getElementById('replay-input').value)">▶ Replay</button>
        </div>

        <div id="messages"></div>

        <div id="controls-container">
            <div id="input-area"></div>
        </div>
    </div>

    <script type="module">
        import mermaid from 'mermaid';
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
        console.log('✅ Mermaid initialised');

        // ── Zoom / pan state ──────────────────────────────────────────────────
        let _scale = 1;
        let _tx = 0, _ty = 0;
        let _dragging = false, _dragStart = null;

        const canvas = () => document.getElementById('diagram-canvas');

        const applyTransform = () => {
            const c = canvas();
            if (c) c.style.transform = `translate(${_tx}px, ${_ty}px) scale(${_scale})`;
        };

        window.diagramZoom = (delta) => {
            _scale = Math.min(3, Math.max(0.25, _scale + delta));
            applyTransform();
        };

        window.diagramReset = () => {
            _scale = 1; _tx = 0; _ty = 0;
            const c = canvas();
            if (c) c.style.transform = '';
        };

        // Mousewheel zoom
        document.addEventListener('wheel', (e) => {
            const vp = document.getElementById('diagram-viewport');
            if (!vp?.contains(e.target)) return;
            e.preventDefault();
            window.diagramZoom(e.deltaY < 0 ? 0.1 : -0.1);
        }, { passive: false });

        // Drag to pan
        const vp = () => document.getElementById('diagram-viewport');
        document.addEventListener('mousedown', (e) => {
            if (!vp()?.contains(e.target) || e.target.closest('button')) return;
            _dragging = true;
            _dragStart = { x: e.clientX - _tx, y: e.clientY - _ty };
        });
        document.addEventListener('mousemove', (e) => {
            if (!_dragging) return;
            _tx = e.clientX - _dragStart.x;
            _ty = e.clientY - _dragStart.y;
            applyTransform();
        });
        document.addEventListener('mouseup', () => { _dragging = false; });

        // ── Diagram render ────────────────────────────────────────────────────
        // visitedEdges: Set of "fromState|toState" strings
        window.renderDiagram = async (config, current, visitedEdges = new Set()) => {
            let graph = `graph TD\n`;

            Object.keys(config.states).forEach(id => {
                const style = id === current ? `:::activeNode` : '';
                graph += `  ${id}["${id}"]${style}\n`;

                if (config.states[id].on) {
                    Object.entries(config.states[id].on).forEach(([ev, transition]) => {
                        const entries = Array.isArray(transition) ? transition : [transition];
                        const targets = new Set();
                        entries.forEach(t => {
                            const tId = typeof t === 'string' ? t : t?.target;
                            if (tId && tId !== id) targets.add(tId);
                        });
                        targets.forEach(tId => {
                            const visited = visitedEdges.has(`${id}|${ev}`);
                            const label   = visited ? `✓ ${ev}` : ev;
                            graph += `  ${id} -- "${label}" --> ${tId}\n`;
                        });
                    });
                }

                if (config.states[id].always) {
                    const targets = Array.isArray(config.states[id].always)
                        ? config.states[id].always : [config.states[id].always];
                    targets.forEach(t => {
                        const tId     = t.target || t;
                        const visited = visitedEdges.has(`${id}|auto`);
                        const label   = visited ? `✓ auto` : `auto`;
                        graph += `  ${id} -- "${label}" --> ${tId}\n`;
                    });
                }

                if (config.states[id].invoke) {
                    const inv = config.states[id].invoke;
                    if (inv.onDone?.target) {
                        const tId     = inv.onDone.target;
                        const visited = visitedEdges.has(`${id}|done`);
                        graph += `  ${id} -. "${visited ? '✓ ' : ''}done" .-> ${tId}\n`;
                    }
                    if (inv.onError?.target) {
                        const tId     = inv.onError.target;
                        const visited = visitedEdges.has(`${id}|error`);
                        graph += `  ${id} -. "${visited ? '✓ ' : ''}error" .-> ${tId}\n`;
                    }
                }
            });

            graph += `\nclassDef activeNode fill:#0084ff,stroke:#0051ff,stroke-width:4px,color:#fff;`;

            console.log('🗺️  Mermaid source:\n' + graph);

            try {
                const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), graph);
                document.getElementById('mermaid-container').innerHTML = svg;
                console.log('✅ Diagram rendered');
            } catch (e) {
                console.error('❌ mermaid.render() threw:', e.message);
                document.getElementById('mermaid-container').innerHTML =
                    `<pre style="color:red;font-size:11px;">Diagram error:\n${e.message}</pre>`;
            }
        };
    </script>

    <script type="module" src="./main.js"></script>

</body>
</html>
