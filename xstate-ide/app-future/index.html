<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SM-IDE</title>
    <script type="importmap">
        { "imports": {
            "xstate":       "https://unpkg.com/xstate@5/dist/xstate.esm.js",
            "mermaid":      "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs",
            "fflate":       "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js",
            "preact":       "https://esm.sh/preact@10.25.4",
            "preact/hooks": "https://esm.sh/preact@10.25.4/hooks",
            "htm/preact":   "https://esm.sh/htm@3.1.1/preact"
        }}
    </script>
    <link rel="stylesheet" href="./ide-theme.css">
    <link rel="stylesheet" href="./chat-theme.css">
</head>
<body>

    <script>
        // Pin phone-sized screens to the mobile overlay model regardless of orientation.
        // Math.min(screen.width, screen.height) is the portrait/shorter dimension —
        // it stays ≤ 700px for phones even in landscape (where window.innerWidth > 700).
        // force-mobile-layout makes the CSS overlay rules apply in landscape too.
        (function () {
            const portraitW = Math.min(screen.width, screen.height);
            if (portraitW <= 700) document.body.classList.add('force-mobile-layout');

            function _syncLandscapeClass() {
                document.body.classList.toggle('mobile-landscape',
                    portraitW <= 700 && window.innerWidth > window.innerHeight);
            }
            _syncLandscapeClass();
            window.addEventListener('resize', _syncLandscapeClass);
        })();
    </script>

    <div id="app">

        <!-- ── Diagram pane — mounted by Preact (DiagramUI.js) via main.js mountDiagramPane().
             display:contents makes this wrapper transparent to #app's flex layout,
             so #diagram-pane (rendered inside by Preact) is a direct flex child. -->
        <div id="diagram-mount" style="display:contents"></div>

        <!-- ── Right pane ─────────────────────────────────────────────────── -->
        <div id="right-pane">

            <div id="slide-handle" title="Drag to resize / tap to collapse">
                <span id="handle-arrow">‹</span>
            </div>

            <!-- Everything else is offset right of the handle -->
            <div id="pane-content">

                <!-- Titlebar — mounted by Preact (PaneUI.js) via main.js mountPaneUI() -->
                <div id="titlebar-mount"></div>

                <!-- Chat UI mount point — fills all available space between titlebar and bottom tools -->
                <div id="chat-mount" style="display:flex; flex-direction:column; flex:1; overflow:hidden; min-width:0;"></div>

                <!-- ── Bottom tools ──────────────────────────────────────────
                     Stacked at the bottom of the right pane in this order:
                     context viewer toggle → context viewer → replay bar → toolbar
                ──────────────────────────────────────────────────────────── -->

                <!-- Mobile pull tab — semicircle at left edge, just above CONTEXT & STATE -->
                <div id="pane-tab" aria-label="Resize or collapse pane">
                    <span id="pane-tab-arrow">›</span>
                </div>

                <!-- Profile section (toggle + viewer) — mounted by Preact (PaneUI.js).
                     display:contents makes this div invisible to #pane-content's flex
                     layout, so #profile-toggle and #profile-viewer are direct flex children. -->
                <div id="profile-mount" style="display:contents"></div>

                <!-- IDE Log observer section — mounted by Preact (PaneUI.js).
                     display:contents keeps #observer-toggle and #observer-viewer as
                     direct flex children of #pane-content. -->
                <div id="observer-mount" style="display:contents"></div>

                <!-- Replay bar — mounted by Preact (PaneUI.js) -->
                <div id="replay-mount"></div>

                <!-- Toolbar — mounted by Preact (ToolbarUI.js) via main.js mountToolbar() -->
                <div id="toolbar-mount"></div>

            </div><!-- end #pane-content -->

        </div><!-- end #right-pane -->

    </div><!-- end #app -->

    <!-- Ghost tab — fixed at right edge, visible only when pane is fully collapsed -->
    <div id="pane-tab-ghost" aria-label="Expand pane">
        <span style="color:#61dafb; font-size:15px; line-height:1; pointer-events:none;">‹</span>
    </div>

    <!-- Touch tooltip -->
    <div id="touch-tooltip"></div>

    <script>
        // Fullscreen nudge — hides mobile URL bar on first button tap.
        // Touch-device only (pointer: coarse). Re-enters fullscreen after the
        // soft keyboard dismisses. Stops retrying on intentional back/exit.
        // body.in-fullscreen is toggled so the exit button can be shown/hidden.
        (() => {
            const isTouch = () => window.matchMedia('(pointer: coarse)').matches;
            let _wantFullscreen = false;

            // First button tap on a touch device: enter fullscreen.
            document.addEventListener('click', function _fsNudge(e) {
                if (!isTouch()) return;
                if (!e.target.closest('button')) return;
                if (e.target.id === 'fs-exit-btn') return; // exit btn handled separately
                _wantFullscreen = true;
                document.documentElement.requestFullscreen?.().catch(() => {});
                document.removeEventListener('click', _fsNudge);
            }, { passive: true });

            // Track fullscreen state for exit button visibility.
            // If we exit while viewport is full-size → intentional exit, stop retrying.
            document.addEventListener('fullscreenchange', () => {
                document.body.classList.toggle('in-fullscreen', !!document.fullscreenElement);
                if (!document.fullscreenElement && _wantFullscreen) {
                    const vv = window.visualViewport;
                    const keyboardOpen = vv && vv.height < window.innerHeight * 0.75;
                    if (!keyboardOpen) _wantFullscreen = false;
                }
            });

            // Re-enter fullscreen when keyboard dismisses (viewport height recovers).
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    if (!_wantFullscreen || document.fullscreenElement) return;
                    const keyboardGone = window.visualViewport.height >= window.innerHeight * 0.9;
                    if (keyboardGone) {
                        document.documentElement.requestFullscreen?.().catch(() => {});
                    }
                });
            }
        })();
    </script>

    <script>
        // Touch tooltip — reads title attribute
        (() => {
            const tip = document.getElementById('touch-tooltip');
            let hideTimer = null;

            function show(text, x, y) {
                clearTimeout(hideTimer);
                tip.textContent = text;
                tip.classList.add('visible');
                const tw = tip.offsetWidth || 220, th = tip.offsetHeight || 40;
                let lx = x + 10, ly = y - th - 10;
                if (lx + tw > window.innerWidth)  lx = x - tw - 10;
                if (ly < 0)                        ly = y + 10;
                tip.style.left = lx + 'px';
                tip.style.top  = ly + 'px';
            }

            function hide(delay = 0) {
                clearTimeout(hideTimer);
                if (delay) hideTimer = setTimeout(() => tip.classList.remove('visible'), delay);
                else tip.classList.remove('visible');
            }

            document.addEventListener('touchstart', (e) => {
                const el = e.target.closest('[title]');
                if (!el) { hide(); return; }
                show(el.getAttribute('title'), e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });

            document.addEventListener('touchend',  () => hide(1200), { passive: true });
            document.addEventListener('touchmove', () => hide(0),    { passive: true });
        })();
    </script>

    <script type="module">
        // ── Slide handle / pane tab — translateX overlay model ────────────────
        //
        // Desktop (> 700px):
        //   #slide-handle is a full-height bar on the left edge of #right-pane.
        //   Mouse drag resizes freely; click toggles a snap position.
        //
        // Mobile (≤ 700px):
        //   #slide-handle is hidden. Two elements handle interaction:
        //   • #pane-tab  — semicircular tab inside pane-content, visible when open.
        //                  Drag: free resize (snap closed if < MIN_VISIBLE px chat).
        //                  Tap: collapse fully.
        //   • #pane-tab-ghost — fixed at right edge, visible only when fully
        //                  collapsed. Mirror image (left-protruding bump).
        //                  Drag: free expand. Tap: expand to full.
        //
        // _panOffset: translateX of #right-pane.
        //   0           = pane fully open (full chat visible).
        //   maxOffset() = pane fully collapsed (ghost tab at right edge).
        const slideHandle  = document.getElementById('slide-handle');
        const rightPane    = document.getElementById('right-pane');
        const paneTab      = document.getElementById('pane-tab');
        const paneTabGhost = document.getElementById('pane-tab-ghost');

        const HANDLE_W      = parseInt(getComputedStyle(document.documentElement)
                                  .getPropertyValue('--handle-w')) || 9;
        const PANE_DEFAULT_W = 460; // must match #right-pane width in ide-theme.css
        const TAB_W          = 44;  // must match #pane-tab width in ide-theme.css
        const MIN_VISIBLE    = 80;  // px — snap closed if chat narrower than this

        const isMobileLayout = () =>
            window.innerWidth <= 700 ||
            document.body.classList.contains('force-mobile-layout');

        let _panOffset = 0;

        // Desktop: offset maps to width reduction (max = full collapse to handle only).
        // Mobile: offset maps to translateX (max = 90% of viewport off-screen).
        const maxOffset = () =>
            isMobileLayout() ? window.innerWidth * 0.9 : PANE_DEFAULT_W - HANDLE_W;

        window._applyPaneOffset = (offset) => _applyOffset(offset, false);

        function _applyOffset(offset, animated) {
            _panOffset = Math.max(0, Math.min(maxOffset(), offset));
            rightPane._panOffset = _panOffset;
            if (isMobileLayout()) {
                rightPane.style.transition = animated ? 'transform 0.3s ease' : 'none';
                rightPane.style.transform  = `translateX(${_panOffset}px)`;
                rightPane.style.width      = '';
                rightPane.style.setProperty('--visible-pane-w',
                    (window.innerWidth - _panOffset) + 'px');
            } else {
                const paneW = Math.max(HANDLE_W, PANE_DEFAULT_W - _panOffset);
                rightPane.style.transition = animated ? 'width 0.3s ease' : 'none';
                rightPane.style.width      = paneW + 'px';
                rightPane.style.transform  = '';
                rightPane.style.setProperty('--visible-pane-w', paneW + 'px');
            }

            // Desktop handle arrow
            const arrow = document.getElementById('handle-arrow');
            if (arrow) arrow.textContent = _panOffset > 10 ? '›' : '‹';

            // Send button: left when pane is compressed, right when fully open
            const pc = document.getElementById('pane-content');
            if (pc) pc.classList.toggle('pane-narrow', _panOffset > 0);

            // Notify results drawer (if visible) so it can track the pane edge
            window._onPanOffsetChange?.();
        }

        // Position #pane-tab above #profile-toggle (with a gap).
        // Called once at load and on resize.
        const TAB_GAP = 24; // px gap between tab bottom and profile-toggle top
        function _positionPaneTab() {
            if (!paneTab) return;
            const toggle = document.getElementById('profile-toggle');
            const pane   = document.getElementById('pane-content');
            if (!toggle || !pane) return;
            const paneRect   = pane.getBoundingClientRect();
            const toggleRect = toggle.getBoundingClientRect();
            // bottom = dist from pane-content bottom to toggle top, + gap
            paneTab.style.bottom =
                Math.round(paneRect.bottom - toggleRect.top + TAB_GAP) + 'px';
        }

        // Position #pane-tab-ghost at the exact same viewport Y as #pane-tab.
        // translateX on the pane does not affect getBoundingClientRect().top,
        // so this stays accurate regardless of the pane's horizontal position.
        function _positionGhostTab() {
            if (!paneTabGhost || !paneTab) return;
            const tabRect = paneTab.getBoundingClientRect();
            paneTabGhost.style.top    = Math.round(tabRect.top) + 'px';
            paneTabGhost.style.bottom = 'auto';
        }

        _positionPaneTab();
        _positionGhostTab();

        // On resize/rotation: reset pane offset if layout mode changed (mobile ↔ desktop),
        // or re-clamp if still mobile (viewport dimensions changed).
        let _lastWasMobile  = isMobileLayout();
        let _lastInnerWidth = window.innerWidth;
        window.addEventListener('resize', () => {
            const nowMobile = isMobileLayout();
            if (_lastWasMobile !== nowMobile) {
                // Mode switched (e.g. portrait→landscape crosses 700px): reset fully open
                _applyOffset(0, false);
            } else if (nowMobile) {
                // Same mobile mode, viewport resized (e.g. rotation on phone).
                // Preserve the visible right-pane pixel width so the diagram grows/shrinks
                // into the new space rather than the pane gobbling up the new width.
                const visiblePaneW = 0.99 * _lastInnerWidth - _panOffset;
                _applyOffset(0.99 * window.innerWidth - visiblePaneW, false);
            }
            _lastWasMobile  = nowMobile;
            _lastInnerWidth = window.innerWidth;
            _positionPaneTab();
            _positionGhostTab();
        });

        // ── Desktop mouse drag on #slide-handle ──────────────────────────────
        let _dragging = false, _dragStartX = 0, _dragStartOffset = 0;

        slideHandle.addEventListener('mousedown', (e) => {
            _dragging        = true;
            _dragStartX      = e.clientX;
            _dragStartOffset = _panOffset;
            document.body.style.cursor     = 'ew-resize';
            document.body.style.userSelect = 'none';
            rightPane.style.transition     = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!_dragging) return;
            _applyOffset(_dragStartOffset + (e.clientX - _dragStartX), false);
        });

        document.addEventListener('mouseup', () => {
            if (!_dragging) return;
            _dragging = false;
            document.body.style.cursor     = '';
            document.body.style.userSelect = '';
            window._persistUIPrefs?.({ paneOffset: _panOffset });
        });

        // ── Touch drag on slide-handle (mobile) ───────────────────────────────
        // ::before is pointer-events:none so chat content stays tappable.
        // A document-level handler watches touches near the handle, but does NOT
        // commit to dragging until there is clear horizontal intent (dx > dy with
        // dx > 8px).  A pure tap in the touch zone never activates dragging, so
        // buttons inside the zone (e.g. replay bar) continue to receive clicks.
        const HIT_EXTEND = 30;

        // Potential-drag state — set on touchstart, committed only in touchmove.
        let _potentialDrag = false, _potentialDragX = 0, _potentialDragY = 0, _potentialDragOffset = 0;

        document.addEventListener('touchstart', (e) => {
            if (!isMobileLayout()) return;
            const x    = e.touches[0].clientX;
            const rect = slideHandle.getBoundingClientRect();
            if (x < rect.left - HIT_EXTEND || x > rect.right + HIT_EXTEND) return;
            // Record where the touch started — commit to drag only in touchmove.
            _potentialDrag         = true;
            _potentialDragX        = x;
            _potentialDragY        = e.touches[0].clientY;
            _potentialDragOffset   = _panOffset;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (_dragging) {
                _applyOffset(_dragStartOffset + (e.touches[0].clientX - _dragStartX), false);
                return;
            }
            if (!_potentialDrag) return;
            const dx = Math.abs(e.touches[0].clientX - _potentialDragX);
            const dy = Math.abs(e.touches[0].clientY - _potentialDragY);
            if (dx > 8 && dx > dy) {
                // Clear horizontal intent — commit to pane drag.
                _dragging              = true;
                _dragStartX            = _potentialDragX;
                _dragStartOffset       = _potentialDragOffset;
                _potentialDrag         = false;
                document.body.style.userSelect = 'none';
                rightPane.style.transition     = 'none';
            } else if (dy > dx + 4) {
                // Vertical scroll intent — cancel.
                _potentialDrag = false;
            }
        }, { passive: true });

        function _endDrag() {
            _potentialDrag = false;
            if (!_dragging) return;
            _dragging = false;
            document.body.style.userSelect = '';
            rightPane.style.transition     = '';
            window._persistUIPrefs?.({ paneOffset: _panOffset });
        }

        document.addEventListener('touchend',    _endDrag);
        document.addEventListener('touchcancel', _endDrag);

        // ── Test results drawer: lifecycle hook ───────────────────────────────
        // main.js owns all drawer logic (row icons, height cap, diagram resize).
        // This observer just notifies it when the drawer is added/removed.
        new MutationObserver((mutations) => {
            mutations.forEach(m => {
                m.addedNodes.forEach(node => {
                    if (node.id === 'test-results-drawer')
                        window._onDrawerAdded?.(node);
                });
                m.removedNodes.forEach(node => {
                    if (node.id === 'test-results-drawer')
                        window._onDrawerRemoved?.();
                });
            });
        }).observe(document.body, { childList: true });

    </script>

    <script type="module" src="./main.js"></script>

    <script type="module" src="./test/scripts/ui-contracts.js"></script>
    <script type="module" src="./test/scripts/runtime-contracts.js"></script>
    <script type="module" src="./test/scripts/smide-contracts.js"></script>
    <script type="module" src="./test/scripts/load-contracts.js"></script>
    <script type="module" src="./test/scripts/ts-roundtrip-contracts.js"></script>

</body>
</html>
