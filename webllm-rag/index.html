<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Site Notebook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Prevent iOS bounce scroll on body, only allow inside #messages */
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

    /* Smooth momentum scroll in messages */
    #messages { -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }

    /* Keep input bar above iOS keyboard */
    #input-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }

    /* Prevent tap highlight flash on mobile */
    button, input { -webkit-tap-highlight-color: transparent; }

    /* Prevent iOS input zoom — font-size must be >= 16px */
    #input { font-size: 16px; }

    /* Typing dots */
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }
    .dot { animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }
  </style>
</head>
<body class="bg-gray-50">

  <div class="flex flex-col" style="height: 100dvh;">

    <!-- Header -->
    <div class="flex-none px-4 py-3 border-b bg-white flex items-center justify-between shadow-sm">
      <h1 class="text-lg font-bold tracking-tight">📚 Site Notebook</h1>
      <div class="flex items-center gap-3">
        <div id="engine-status" class="text-xs"></div>
        <button onclick="clearChat()" class="text-xs text-gray-400 hover:text-red-500 active:text-red-500">🗑</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-3 py-4 space-y-3"></div>

    <!-- Status (loading indicator) -->
    <div id="status" class="flex-none text-xs text-center text-gray-400 px-4 py-1 min-h-[1.25rem]"></div>

    <!-- Input bar -->
    <div id="input-bar" class="flex-none border-t bg-white px-3 py-3">
      <div class="flex gap-2 items-center">
        <input
          id="input"
          class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50"
          placeholder="Ask about the site…"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        >
        <button
          id="send-btn"
          class="flex-none bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-full w-10 h-10 flex items-center justify-center shadow transition-colors"
          aria-label="Send"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="app.js" defer></script>
</body>
</html>
