<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Logic Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --text: #1c1e21; --error: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); overflow: hidden; }

	/* 1. Lock the left pane so it never scrolls the whole window */
#diagram-pane {
    flex: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    overflow: hidden;
}

/* 2. Make the container a 'flex-box' that centers the diagram */
#mermaid-container {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* 3. Force the Mermaid SVG to stay within bounds */
#mermaid-container svg {
    max-height: 100% !important;
    width: auto !important;
    display: block;
    margin: auto;
}

        /* Right Pane: Split into Profile (Top) and Chat (Bottom) */
        #right-pane { width: 420px; display: flex; flex-direction: column; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        
        #profile-viewer { 
            height: 120px; padding: 15px; background: #282c34; color: #61dafb; 
            font-family: monospace; font-size: 11px; overflow-y: auto; border-bottom: 2px solid #444;
        }

        #chat-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f9f9f9; }
        
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .bot { background: #e4e6eb; align-self: flex-start; }
        .user { background: var(--primary); color: white; align-self: flex-end; }

        /* Controls & Inline Error */
        #controls-container { padding: 20px; border-top: 1px solid #eee; background: white; }
        #input-area { display: flex; flex-direction: column; gap: 10px; }
        .button-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        
        input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 10px; border: none; background: var(--primary); color: white; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .activeNode rect { fill: #ff4757 !important; stroke: #ff6b81 !important; stroke-width: 4px !important; }
	#error-display {
    min-height: 20px;
    margin-bottom: 10px;
    font-size: 13px;
    transition: all 0.2s ease;
}

/* Make the bold numbers in buttons pop a bit more */
button strong {
    background: rgba(255,255,255,0.2);
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 5px;
}
    </style>
</head>
<body>
    <div id="diagram-pane">
        <h3 style="margin: 0 0 10px 0; color: #888;">Flow Traceability</h3>
        <div id="mermaid-container"></div>
    </div>

    <div id="right-pane">
	    <div id="config-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #1c1e21; border-bottom: 1px solid #444;">
    <span style="color: #61dafb; font-size: 12px; font-weight: bold;">GENERIC ENGINE v3.0</span>
    <div>
        <button onclick="document.getElementById('config-upload').click()" style="padding: 5px 10px; font-size: 11px; background: #444;">📂 Load JSON</button>
        <input type="file" id="config-upload" accept=".json" style="display: none;">
    </div>
</div>
        <div id="profile-viewer">Lead Profile: {}</div>
        <div id="chat-section">
            <div id="messages"></div>
            <div id="controls-container">
                <div id="error-display"></div>
                <div id="input-area"></div>
            </div>
        </div>
    </div>

    <script src="engine.js" defer></script>
</body>
</html>
